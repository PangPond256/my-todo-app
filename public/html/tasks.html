<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>งานทั้งหมด - Todo Manager</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/tasks.css">
    <link rel="stylesheet" href="/css/task-modal.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo_todo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo_todo.png">
</head>

<body>
    <div class="app-shell">
        <nav class="navbar">
            <div class="logo-section">
                <img src="/images/logo_todo.png" alt="logo">
                <div class="brand-block">
                    <span class="brand-name">Todo Manager</span>
                    <small class="brand-tagline">จัดการงานอย่างมีประสิทธิภาพ</small>
                </div>
            </div>

            <div class="nav-links">
                <button class="nav-item" onclick="window.location.href='/dashboard'">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </button>

                <button class="nav-item active">
                    <span class="material-symbols-outlined">list_alt</span>
                    งานทั้งหมด
                </button>

                <button class="nav-item" onclick="window.location.href='/members-page'">
                    <span class="material-symbols-outlined">group</span>
                    จัดการสมาชิก
                </button>

                <button class="nav-item" onclick="window.location.href='/categories-page'">
                    <span class="material-symbols-outlined">folder</span>
                    จัดการหมวดหมู่
                </button>
            </div>

            <div class="user-profile">
                <div id="user-avatar"></div>
                <div class="user-info">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <header class="page-header">
                <div class="page-title-wrap">
                    <div class="page-icon">
                        <span class="material-symbols-outlined">checklist</span>
                    </div>
                    <div>
                        <h1>งานทั้งหมด</h1>
                        <p>จัดการและติดตามงานของคุณ</p>
                    </div>
                </div>

                <button class="btn-primary btn-add" onclick="openTaskModal()">
                    <span class="material-symbols-outlined">add</span>
                    เพิ่มงานใหม่
                </button>
            </header>

            <section class="filter-card">
                <div class="filter-head">
                    <div class="filter-icon">
                        <span class="material-symbols-outlined">filter_alt</span>
                    </div>
                    <div>
                        <h3>ค้นหาและกรองงาน</h3>
                    </div>
                </div>

                <div class="filter-grid">
                    <div class="search-box">
                        <span class="material-symbols-outlined">search</span>
                        <input id="searchInput" type="text" placeholder="ค้นหางาน, คำอธิบาย, หมวดหมู่...">
                    </div>

                    <select id="statusFilter">
                        <option value="">สถานะทั้งหมด</option>
                        <option value="pending">รอดำเนินการ</option>
                        <option value="doing">กำลังทำ</option>
                        <option value="done">เสร็จสิ้น</option>
                    </select>

                    <select id="priorityFilter">
                        <option value="">ความสำคัญทั้งหมด</option>
                        <option value="low">ต่ำ</option>
                        <option value="medium">ปานกลาง</option>
                        <option value="high">สูง</option>
                        <option value="urgent">ด่วนมาก</option>
                    </select>

                    <select id="categoryFilter">
                        <option value="">ทุกหมวดหมู่</option>
                    </select>

                    <select id="ownerFilter">
                        <option value="">ทุกงาน</option>
                        <option value="mine">งานของฉัน</option>
                        <option value="tagged">งานที่ถูกแท็ก</option>
                    </select>
                </div>
            </section>

            <section class="result-bar">
                <div class="result-dot"></div>
                <p id="resultCount">แสดง 0 จาก 0 งาน</p>
            </section>

            <section id="tasksGrid" class="tasks-grid"></section>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content task-modal-premium">
            <div class="modal-header">
                <div class="title-with-icon">
                    <div class="modal-title-icon">
                        <span class="material-symbols-outlined">add_task</span>
                    </div>
                    <div>
                        <h2>เพิ่มงานใหม่</h2>
                        <p>สร้างงานใหม่และกำหนดรายละเอียดได้ทันที</p>
                    </div>
                </div>

                <button type="button" class="close-btn" onclick="closeTaskModal()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="addTaskForm" class="task-form">
                <div class="form-group">
                    <label>ชื่องาน *</label>
                    <input type="text" name="title" placeholder="ระบุชื่องาน" required>
                </div>

                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea name="description" rows="4" placeholder="ระบุรายละเอียดงาน"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>สถานะ</label>
                        <select name="status">
                            <option value="pending">รอดำเนินการ</option>
                            <option value="doing">กำลังทำ</option>
                            <option value="done">เสร็จสิ้น</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>ความสำคัญ</label>
                        <select name="priority">
                            <option value="low">ต่ำ</option>
                            <option value="medium" selected>ปานกลาง</option>
                            <option value="high">สูง</option>
                            <option value="urgent">ด่วนมาก</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>กำหนดเวลา</label>
                        <input type="date" id="taskDueDate" name="dueDate" required>
                    </div>

                    <div class="form-group">
                        <label>หมวดหมู่</label>
                        <select id="taskCategory" name="categoryId">
                            <option value="">เลือกหมวดหมู่</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>แท็กผู้เกี่ยวข้อง</label>
                    <div id="member-list-tags" class="tag-selection-area"></div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeTaskModal()">ยกเลิก</button>
                    <button type="submit" class="btn-submit">เพิ่มงาน</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/task-modal.js"></script>
    <script src="/js/tasks.js"></script>
</body>

</html>
