<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category Page</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/category.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo_todo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo_todo.png">
</head>

<body>
    <div class="app-shell">
        <nav class="navbar">
            <div class="logo-section">
                <img src="/images/logo_todo.png" alt="logo">
                <div class="brand-block">
                    <span class="brand-name">Todo Manager</span>
                    <small class="brand-tagline">จัดการงานอย่างมีประสิทธิภาพ</small>
                </div>
            </div>

            <div class="nav-links">
                <button class="nav-item" onclick="window.location.href='/dashboard'">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </button>

                <button class="nav-item" onclick="window.location.href='/tasks-page'">
                    <span class="material-symbols-outlined">list_alt</span>
                    งานทั้งหมด
                </button>

                <button class="nav-item" onclick="window.location.href='/members-page'">
                    <span class="material-symbols-outlined">group</span>
                    จัดการสมาชิก
                </button>

                <button class="nav-item active">
                    <span class="material-symbols-outlined">folder</span>
                    จัดการหมวดหมู่
                </button>
            </div>

            <div class="user-profile">
                <div id="user-avatar"></div>
                <div class="user-info">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <header class="page-header">
                <div class="page-title-wrap">
                    <div class="page-icon">
                        <span class="material-symbols-outlined">folder_open</span>
                    </div>
                    <div>
                        <h1>จัดการหมวดหมู่</h1>
                        <p>เพิ่มและจัดการหมวดหมู่งานของคุณ</p>
                    </div>
                </div>

                <button class="btn-primary" onclick="openCategoryModal()">
                    <span class="material-symbols-outlined">create_new_folder</span>
                    เพิ่มหมวดหมู่ใหม่
                </button>
            </header>

            <section class="summary-card">
                <div class="summary-icon">
                    <span class="material-symbols-outlined">folder</span>
                </div>
                <div class="summary-info">
                    <p>จำนวนหมวดหมู่ทั้งหมด</p>
                    <h2 id="totalCategoryCount">0 หมวดหมู่</h2>
                </div>
            </section>

            <section id="categoryGrid" class="category-grid"></section>
        </main>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content category-modal-premium">
            <div class="modal-header">
                <div>
                    <h2>เพิ่มหมวดหมู่ใหม่</h2>
                </div>
                <button type="button" class="close-btn" onclick="closeCategoryModal()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="categoryForm" class="category-form">
                <div class="form-group">
                    <label>ชื่อหมวดหมู่ *</label>
                    <input type="text" id="categoryName" name="name" placeholder="ระบุชื่อหมวดหมู่" required>
                </div>

                <div class="form-group">
                    <label>สี</label>
                    <div id="colorPicker" class="color-picker">
                        <button type="button" class="color-btn active bg-blue" data-color="bg-blue"></button>
                        <button type="button" class="color-btn bg-pink" data-color="bg-pink"></button>
                        <button type="button" class="color-btn bg-green" data-color="bg-green"></button>
                        <button type="button" class="color-btn bg-orange" data-color="bg-orange"></button>
                        <button type="button" class="color-btn bg-purple" data-color="bg-purple"></button>
                        <button type="button" class="color-btn bg-red" data-color="bg-red"></button>
                        <button type="button" class="color-btn bg-cyan" data-color="bg-cyan"></button>
                        <button type="button" class="color-btn bg-amber" data-color="bg-amber"></button>
                        <button type="button" class="color-btn bg-sky" data-color="bg-sky"></button>
                        <button type="button" class="color-btn bg-lime" data-color="bg-lime"></button>
                    </div>
                </div>

                <div class="form-group">
                    <label>ไอคอน</label>
                    <div id="iconPicker" class="icon-picker">
                        <button type="button" class="icon-btn active" data-icon="work">
                            <span class="material-symbols-outlined">work</span>
                            <small>กระเป๋าเอกสาร</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="person">
                            <span class="material-symbols-outlined">person</span>
                            <small>ผู้ใช้</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="group">
                            <span class="material-symbols-outlined">group</span>
                            <small>กลุ่ม</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="folder">
                            <span class="material-symbols-outlined">folder</span>
                            <small>โฟลเดอร์</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="event">
                            <span class="material-symbols-outlined">event</span>
                            <small>ปฏิทิน</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="menu_book">
                            <span class="material-symbols-outlined">menu_book</span>
                            <small>หนังสือ</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="home">
                            <span class="material-symbols-outlined">home</span>
                            <small>บ้าน</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="shopping_cart">
                            <span class="material-symbols-outlined">shopping_cart</span>
                            <small>ตะกร้า</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="favorite">
                            <span class="material-symbols-outlined">favorite</span>
                            <small>หัวใจ</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="star">
                            <span class="material-symbols-outlined">star</span>
                            <small>ดาว</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="schedule">
                            <span class="material-symbols-outlined">schedule</span>
                            <small>นัดหมาย</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="mail">
                            <span class="material-symbols-outlined">mail</span>
                            <small>อีเมล</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="call">
                            <span class="material-symbols-outlined">call</span>
                            <small>โทรศัพท์</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="photo_camera">
                            <span class="material-symbols-outlined">photo_camera</span>
                            <small>กล้อง</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="music_note">
                            <span class="material-symbols-outlined">music_note</span>
                            <small>เพลง</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="code">
                            <span class="material-symbols-outlined">code</span>
                            <small>โค้ด</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="coffee">
                            <span class="material-symbols-outlined">coffee</span>
                            <small>กาแฟ</small>
                        </button>
                        <button type="button" class="icon-btn" data-icon="redeem">
                            <span class="material-symbols-outlined">redeem</span>
                            <small>ของขวัญ</small>
                        </button>
                    </div>
                </div>

                <div class="preview-box">
                    <p>ตัวอย่าง</p>
                    <div class="preview-card">
                        <div id="previewCategoryIcon" class="preview-icon bg-blue">
                            <span class="material-symbols-outlined">work</span>
                        </div>
                        <div>
                            <h3 id="previewCategoryName">ชื่อหมวดหมู่</h3>
                            <p id="previewCategoryMeta">#3b82f6 • work</p>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeCategoryModal()">ยกเลิก</button>
                    <button type="submit" class="btn-submit">เพิ่มหมวดหมู่</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/category.js"></script>
</body>

</html>
