<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member Page</title>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/member.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/logo_todo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/logo_todo.png">
</head>

<body>
    <div class="app-shell">
        <nav class="navbar">
            <div class="logo-section">
                <img src="/images/logo_todo.png" alt="logo">
                <div class="brand-block">
                    <span class="brand-name">Todo Manager</span>
                    <small class="brand-tagline">จัดการงานอย่างมีประสิทธิภาพ</small>
                </div>
            </div>

            <div class="nav-links">
                <button class="nav-item" onclick="window.location.href='/dashboard'">
                    <span class="material-symbols-outlined">dashboard</span>
                    Dashboard
                </button>

                <button class="nav-item" onclick="window.location.href='/tasks-page'">
                    <span class="material-symbols-outlined">list_alt</span>
                    งานทั้งหมด
                </button>

                <button class="nav-item active">
                    <span class="material-symbols-outlined">group</span>
                    จัดการสมาชิก
                </button>

                <button class="nav-item" onclick="window.location.href='/categories-page'">
                    <span class="material-symbols-outlined">folder</span>
                    จัดการหมวดหมู่
                </button>
            </div>

            <div class="user-profile">
                <div id="user-avatar"></div>
                <div class="user-info">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <header class="page-header">
                <div class="page-title-wrap">
                    <div class="page-icon">
                        <span class="material-symbols-outlined">group</span>
                    </div>
                    <div>
                        <h1>จัดการสมาชิก</h1>
                        <p>เพิ่มและจัดการสมาชิกในทีมของคุณ</p>
                    </div>
                </div>

                <button class="btn-primary" onclick="openMemberModal()">
                    <span class="material-symbols-outlined">person_add</span>
                    เพิ่มสมาชิกใหม่
                </button>
            </header>

            <section class="summary-card">
                <div class="summary-icon">
                    <span class="material-symbols-outlined">groups</span>
                </div>
                <div class="summary-info">
                    <p>จำนวนสมาชิกทั้งหมด</p>
                    <h2 id="totalCount">0 คน</h2>
                </div>
            </section>

            <section id="memberGrid" class="member-grid"></section>
        </main>
    </div>

    <div id="memberModal" class="modal">
        <div class="modal-content member-modal-premium">
            <div class="modal-header">
                <div>
                    <h2>เพิ่มสมาชิกใหม่</h2>
                    <p class="modal-subtitle">เพิ่มเข้าทีมโดยใช้อีเมลที่มีอยู่ในระบบ</p>
                </div>
                <button type="button" class="close-btn" onclick="closeMemberModal()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="memberForm" class="member-form">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล *</label>
                    <input type="text" id="memberName" name="name" placeholder="ระบุชื่อ-นามสกุล" required>
                </div>

                <div class="form-group">
                    <label>อีเมล *</label>
                    <input type="email" id="memberEmail" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label>สีของสมาชิกในทีมนี้</label>
                    <div id="colorPicker" class="color-picker">
                        <button type="button" class="color-btn active bg-blue" data-color="bg-blue"></button>
                        <button type="button" class="color-btn bg-pink" data-color="bg-pink"></button>
                        <button type="button" class="color-btn bg-green" data-color="bg-green"></button>
                        <button type="button" class="color-btn bg-orange" data-color="bg-orange"></button>
                        <button type="button" class="color-btn bg-purple" data-color="bg-purple"></button>
                        <button type="button" class="color-btn bg-red" data-color="bg-red"></button>
                        <button type="button" class="color-btn bg-cyan" data-color="bg-cyan"></button>
                        <button type="button" class="color-btn bg-amber" data-color="bg-amber"></button>
                        <button type="button" class="color-btn bg-sky" data-color="bg-sky"></button>
                        <button type="button" class="color-btn bg-lime" data-color="bg-lime"></button>
                    </div>
                </div>

                <div class="preview-box">
                    <p>ตัวอย่าง</p>
                    <div class="preview-card">
                        <div id="previewAvatar" class="member-avatar bg-blue">?</div>
                        <div>
                            <h3 id="previewName">ชื่อสมาชิก</h3>
                            <p id="previewEmail">อีเมล</p>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeMemberModal()">ยกเลิก</button>
                    <button type="submit" class="btn-submit">เพิ่มสมาชิก</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/member.js"></script>
</body>

</html>
